name: plc-datalink-rfc1006-test

# Test-only stack — kept separate from dc-plc-datalink-rfc1006-{dev,acr}.yml on purpose.
# Each service runs its own framework against the host code, a testcontainers-spawned
# dependency, or a real service brought up in this file.
#
# Two flavours of frontend tests:
#   frontend-test      — Jest unit suite (mocks, fast, no dependencies)
#   frontend-test-int  — Jest integration suite (real backend + couchdb + mqtt;
#                        optional external ZKS-Mock for live S7 data)
#
# Usage:
#   docker compose -f dc-plc-datalink-rfc1006-test.yml build
#   docker compose -f dc-plc-datalink-rfc1006-test.yml run --rm frontend-test
#   docker compose -f dc-plc-datalink-rfc1006-test.yml run --rm frontend-test-int
#   docker compose -f dc-plc-datalink-rfc1006-test.yml run --rm backend-test
#   docker compose -f dc-plc-datalink-rfc1006-test.yml run --rm database-test
#
# ZKS-Mock is external — bring it up separately from its own repo
# (docs/machines-db-layout/zks-machine-mock/README.md). Integration specs skip
# gracefully when ZKS is unreachable on host.docker.internal:102.

services:
  frontend-test:
    image: plc-datalink-rfc1006-frontend-test:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    container_name: plc-datalink-rfc1006-frontend-test
    hostname: plc-datalink-rfc1006-frontend-test
    # Source is mounted ro so re-runs pick up edits without rebuilding the image.
    # node_modules lives at /app/node_modules inside the image and is NOT shadowed
    # because the mounts only target /app/src etc.
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/test:/app/test:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/jest.config.js:/app/jest.config.js:ro
      - ./frontend/jest.config.int.js:/app/jest.config.int.js:ro
      - ./frontend/setup-jest.ts:/app/setup-jest.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./frontend/tsconfig.spec.json:/app/tsconfig.spec.json:ro
      - ./frontend/angular.json:/app/angular.json:ro
    networks:
      - plc-datalink-rfc1006-test-network

  # Real CouchDB the integration suite talks to via the Flask backend.
  database-int:
    image: plc-datalink-rfc1006-database:dev
    build:
      context: ./database
    container_name: plc-datalink-rfc1006-database-int
    hostname: plc-datalink-rfc1006-database-int
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=password
    networks:
      - plc-datalink-rfc1006-test-network

  # Real Flask backend (same image as DEV/PROD), pointed at the integration CouchDB.
  backend-int:
    image: plc-datalink-rfc1006-backend:dev
    build:
      context: ./backend
    container_name: plc-datalink-rfc1006-backend-int
    hostname: plc-datalink-rfc1006-backend-int
    environment:
      - DATABASE_USER_NAME=admin
      - DATABASE_SECRET_KEY=password
      - DATABASE_URL=http://plc-datalink-rfc1006-database-int:5984
    depends_on:
      - database-int
    # ZKS-Mock lives on the host (its own `make up`). Telegraf instances launched
    # by the backend reach it via host.docker.internal:102.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - plc-datalink-rfc1006-test-network

  # Frontend integration suite — same image as frontend-test, different config.
  frontend-test-int:
    image: plc-datalink-rfc1006-frontend-test:dev
    container_name: plc-datalink-rfc1006-frontend-test-int
    hostname: plc-datalink-rfc1006-frontend-test-int
    command: ["npx", "jest", "--config", "jest.config.int.js", "--ci", "--colors"]
    environment:
      - BACKEND_URL=http://plc-datalink-rfc1006-backend-int:5000
      # ZKS-Mock reachability hint for specs that exercise PLC-touching endpoints.
      # If unset/empty, ZKS specs skip themselves.
      - ZKS_S7_HOST=host.docker.internal
      - ZKS_S7_PORT=102
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/test:/app/test:ro
      - ./frontend/jest.config.js:/app/jest.config.js:ro
      - ./frontend/jest.config.int.js:/app/jest.config.int.js:ro
      - ./frontend/setup-jest.ts:/app/setup-jest.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./frontend/tsconfig.spec.json:/app/tsconfig.spec.json:ro
      - ./frontend/angular.json:/app/angular.json:ro
    depends_on:
      - backend-int
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - plc-datalink-rfc1006-test-network

  backend-test:
    image: plc-datalink-rfc1006-backend-test:dev
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: plc-datalink-rfc1006-backend-test
    hostname: plc-datalink-rfc1006-backend-test
    # Source is baked into the image (see backend/Dockerfile.test). Code changes
    # require a rebuild; that's intentional so the image used for testing matches
    # what runs in production. testcontainers (used in e2e) needs the host Docker
    # socket; safe because this service is DEV-only and never published.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # On Linux, containers reach host-mapped ports via host.docker.internal
      # only when extra_hosts maps it to host-gateway (see below).
      - TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - plc-datalink-rfc1006-test-network

  database-test:
    image: plc-datalink-rfc1006-database-test:dev
    build:
      context: ./database
      dockerfile: Dockerfile.test
    container_name: plc-datalink-rfc1006-database-test
    hostname: plc-datalink-rfc1006-database-test
    # testcontainers spawns its own couchdb:3 container via the mounted socket
    # (per ADR-0008). database test code is mounted ro from the host so the
    # image stays minimal.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./database/test:/app/database/test:ro
      - ./database/config:/app/database/config:ro
      - ./database/Dockerfile:/app/database/Dockerfile:ro
      # ZKS reference machine drives the integration suite — see
      # docs/machines-db-layout/zks-machine-mock/README.md and ADR-0008.
      - ./docs/machines-db-layout/zks-machine-mock:/app/docs/machines-db-layout/zks-machine-mock:ro
    environment:
      - TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - plc-datalink-rfc1006-test-network

networks:
  plc-datalink-rfc1006-test-network:
    name: plc-datalink-rfc1006-test-network
    driver: bridge
