<section class="oc-page">
  <h1 class="oc-page__title">
    {{ isEditing() ? 'Konfiguration bearbeiten' : 'Konfiguration anlegen' }}
  </h1>
  <p class="oc-page__lead">
    Machine, MQTT-Ziel und PLC-Tags definieren. Alle Felder werden client-seitig validiert; das
    Backend prüft serverseitig zusätzlich auf Konsistenz.
  </p>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <oc-card title="Machine">
      <div formGroupName="machineData" class="oc-form__grid">
        <oc-field
          label="Machine Name"
          help="Kurzname ohne Leerzeichen, dient als Doc-ID in CouchDB."
          [error]="machineDataError('machineName')"
        >
          <input
            ocInput
            type="text"
            formControlName="machineName"
            autocomplete="off"
            spellcheck="false"
          />
        </oc-field>

        <oc-field
          label="PLC IP"
          help="IPv4-Adresse der S7-Steuerung."
          [error]="machineDataError('plcIp')"
          [mono]="true"
        >
          <input
            ocInput
            type="text"
            inputmode="numeric"
            formControlName="plcIp"
            placeholder="192.168.1.1"
            autocomplete="off"
          />
        </oc-field>

        <oc-field
          label="PLC Port"
          help="Standard für RFC1006 ist 102."
          [error]="machineDataError('plcPort')"
          [mono]="true"
        >
          <input ocInput type="number" formControlName="plcPort" min="1" max="65535" />
        </oc-field>

        <oc-field
          label="Rack"
          help="0–100; für S7-1500 üblicherweise 0."
          [error]="machineDataError('plcRack')"
          [mono]="true"
        >
          <input ocInput type="number" formControlName="plcRack" min="0" max="100" />
        </oc-field>

        <oc-field
          label="Slot"
          help="0–18; für S7-1500 üblicherweise 1."
          [error]="machineDataError('plcSlot')"
          [mono]="true"
        >
          <input ocInput type="number" formControlName="plcSlot" min="0" max="18" />
        </oc-field>

        <oc-field
          label="Batch-Größe (PDU)"
          help="Maximale Anzahl Tags pro Request, mind. 1."
          [error]="machineDataError('pduSize')"
          [mono]="true"
        >
          <input ocInput type="number" formControlName="pduSize" min="1" />
        </oc-field>

        <oc-field
          label="Intervall (s)"
          help="Polling-Intervall in Sekunden, mind. 1."
          [error]="machineDataError('requestInterval')"
          [mono]="true"
        >
          <input ocInput type="number" formControlName="requestInterval" min="1" />
        </oc-field>
      </div>
    </oc-card>

    <oc-card title="MQTT">
      <div formGroupName="mqttData" class="oc-form__grid">
        <oc-field
          label="MQTT IP"
          help="IPv4-Adresse des MQTT-Brokers."
          [error]="mqttError('mqttIp')"
          [mono]="true"
        >
          <input
            ocInput
            type="text"
            inputmode="numeric"
            formControlName="mqttIp"
            placeholder="192.168.1.1"
            autocomplete="off"
          />
        </oc-field>

        <oc-field
          label="MQTT Port"
          help="Standard plain ist 1883."
          [error]="mqttError('mqttPort')"
          [mono]="true"
        >
          <input ocInput type="number" formControlName="mqttPort" min="1" max="65535" />
        </oc-field>

        <oc-field
          label="MQTT Topic"
          help="Vollständiger Topic-Pfad, z. B. on/ot/devBoard."
          [error]="mqttError('mqttTopic')"
          [mono]="true"
        >
          <input
            ocInput
            type="text"
            formControlName="mqttTopic"
            placeholder="on/ot/devBoard"
            autocomplete="off"
            spellcheck="false"
          />
        </oc-field>
      </div>
    </oc-card>

    <oc-card title="PLC Tags" subtitle="DB-Adressen aus dem S7-Datenbaustein, ein Tag pro Zeile.">
      <div formArrayName="plcTagData" class="oc-tags">
        @for (tag of plcTagsArray.controls; track $index; let i = $index) {
          <div [formGroupName]="i" class="oc-tags__row">
            <oc-field
              label="Tag-Name"
              help="Buchstaben und Ziffern, z. B. lightBarrier."
              [error]="tagNameError(i)"
            >
              <input ocInput type="text" formControlName="tagName" autocomplete="off" />
            </oc-field>
            <oc-field
              label="Tag-Adresse"
              help="Format: DB&lt;n&gt;.&lt;type&gt;&lt;addr&gt;[.bit], z. B. DB9.X1732.1."
              [error]="tagAddressError(i)"
              [mono]="true"
            >
              <input ocInput type="text" formControlName="tagAddress" autocomplete="off" spellcheck="false" />
            </oc-field>
            <div class="oc-tags__row-actions">
              <button type="button" ocButton variant="ghost" [compact]="true" (click)="removeTag(i)">
                Entfernen
              </button>
            </div>
          </div>
        }
        <div class="oc-tags__add">
          <button type="button" ocButton variant="secondary" (click)="addTag()">
            + Tag hinzufügen
          </button>
        </div>
      </div>
    </oc-card>

    <footer class="oc-form__footer">
      <button type="submit" ocButton variant="primary" [disabled]="submitting()">
        {{ isEditing() ? 'Änderungen speichern' : 'Konfiguration anlegen' }}
      </button>
    </footer>
  </form>
</section>
