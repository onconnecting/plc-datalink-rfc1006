# nginx custom server block — frontend-next/
#
# The backend exposes routes directly under /config/* and /machine/*.
# Per .claude/rules/frontend.md the Angular service uses these relative
# paths; the legacy /api/ prefix is dropped in the rewrite.
#
# Each backend route family gets its own location block — no wildcard
# fallbacks (CI rule: nginx-custom.conf must reflect real backend routes).

server {
    listen 80;
    server_name localhost;

    # Angular SPA — index.html fallback for client-side routes.
    location / {
        root /usr/share/nginx/html/browser;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend: machine configuration CRUD.
    location /config/ {
        proxy_pass http://plc-datalink-rfc1006-backend:5000/config/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend: machine lifecycle and state.
    location /machine/ {
        proxy_pass http://plc-datalink-rfc1006-backend:5000/machine/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend: Swagger UI.
    location /swagger/ {
        proxy_pass http://plc-datalink-rfc1006-backend:5000/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend: OpenAPI spec served as a static asset.
    location /static/openapi/ {
        proxy_pass http://plc-datalink-rfc1006-backend:5000/static/openapi/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
