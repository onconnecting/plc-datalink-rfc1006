name: Lint

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'architecture/**'
      - .gitignore
  pull_request:

jobs:
  ruff-backend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check src test
        working-directory: backend
      - name: Ruff format check
        run: ruff format --check src test
        working-directory: backend

  prettier-frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Prettier check
        run: npx --yes prettier --check "src/**/*.{ts,js,html,css,scss,json}"
        working-directory: frontend
