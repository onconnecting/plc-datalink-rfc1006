name: plc-datalink-rfc1006-e2e

# End-to-end test stack: real production-image backend + real CouchDB +
# real Mosquitto broker + a pytest runner. The ZKS machine mock lives on
# a separate LAN host (see docs/machines-db-layout/zks-machine-mock/) —
# default `192.168.0.180:102`, overridable via `ZKS_S7_HOST`/`ZKS_S7_PORT`.
#
# The runner reads ZKS_S7_HOST and posts it as `plcIp` to the backend, so
# Telegraf inside `backend-e2e` dials the same endpoint as the snap7 calls
# from `backend-e2e-runner`. Both containers reach the LAN through the
# bridge's default NAT — no host-port hop required.
#
# `host.docker.internal:host-gateway` stays mapped for the rare case where
# the mock IS co-located with the docker host: set `ZKS_S7_HOST=host.docker.internal`
# (e.g. via .env) and the same compose still works.
#
# This stack is intentionally separate from
# dc-plc-datalink-rfc1006-{dev,acr,test}.yml — different lifecycle, no
# shared volumes, no published host ports.
#
# Typical usage:
#   1) Start the ZKS mock (docs/machines-db-layout/zks-machine-mock/)
#   2) (optional) export ZKS_S7_HOST=<ip>  # if not 192.168.0.180
#   3) docker compose -f dc-plc-datalink-rfc1006-e2e.yml build
#   4) docker compose -f dc-plc-datalink-rfc1006-e2e.yml run --rm backend-e2e-runner
#   5) docker compose -f dc-plc-datalink-rfc1006-e2e.yml down -v --remove-orphans

services:
  couchdb-e2e:
    image: plc-datalink-rfc1006-database-e2e:dev
    build:
      context: ./database
    container_name: plc-datalink-rfc1006-couchdb-e2e
    hostname: plc-datalink-rfc1006-couchdb-e2e
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=admin
    networks:
      - e2e-net

  mosquitto-e2e:
    image: eclipse-mosquitto:2
    container_name: plc-datalink-rfc1006-mosquitto-e2e
    hostname: plc-datalink-rfc1006-mosquitto-e2e
    volumes:
      - ./backend/test/scripts/integration/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - e2e-net

  backend-e2e:
    # Built from the same Dockerfile as production — Telegraf, supervisord,
    # gunicorn, Flask all live here. The runner only talks HTTP to it.
    image: plc-datalink-rfc1006-backend-e2e:dev
    build:
      context: ./backend
    container_name: plc-datalink-rfc1006-backend-e2e
    hostname: plc-datalink-rfc1006-backend-e2e
    environment:
      - DATABASE_USER_NAME=admin
      - DATABASE_SECRET_KEY=admin
      - DATABASE_URL=http://plc-datalink-rfc1006-couchdb-e2e:5984
      - DATABASE_NAME=datalink
    depends_on:
      - couchdb-e2e
    # Telegraf inside this container needs to reach the host-bound ZKS S7
    # server. host-gateway is the standard Docker bridge → host trick.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - e2e-net

  backend-e2e-runner:
    # Reuses the backend-test image (built from Dockerfile.test) — it
    # already has pytest, paho-mqtt, python-snap7, and the test sources.
    image: plc-datalink-rfc1006-backend-test:dev
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: plc-datalink-rfc1006-backend-e2e-runner
    hostname: plc-datalink-rfc1006-backend-e2e-runner
    depends_on:
      - backend-e2e
      - mosquitto-e2e
    environment:
      # Drives the E2E test's fixtures — see backend/test/scripts/integration/conftest.py
      - E2E_BACKEND_URL=http://plc-datalink-rfc1006-backend-e2e:5000
      - E2E_MQTT_HOST=plc-datalink-rfc1006-mosquitto-e2e
      - E2E_MQTT_PORT=1883
      # The config the runner POSTs to the backend reuses these:
      - TEST_MQTT_HOST=plc-datalink-rfc1006-mosquitto-e2e
      - TEST_MQTT_PORT=1883
      # Canonical ZKS mock address from
      # docs/machines-db-layout/zks-machine-mock/db-layout.yaml. The runner
      # posts this as plcIp into the backend, so Telegraf inside backend-e2e
      # dials the same target. Override via ZKS_S7_HOST/PORT in .env if the
      # mock is co-located with the test runner — bridge NAT covers both.
      - ZKS_S7_HOST=${ZKS_S7_HOST:-192.168.0.180}
      - ZKS_S7_PORT=${ZKS_S7_PORT:-102}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - e2e-net
    command:
      - pytest
      - -v
      - test/scripts/integration/test_e2e_zks_mqtt.py

networks:
  e2e-net:
    name: plc-datalink-rfc1006-e2e-net
    driver: bridge
