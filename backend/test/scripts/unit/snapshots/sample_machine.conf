# agent Configuration
[agent]
  interval = "1s"
  round_interval = true
  hostname = "PLC Datalink RFC1006"
  flush_interval = "1s"
  metric_batch_size = 100
  metric_buffer_limit = 1000
  log_with_timezone = "local"
  quiet = false
  debug = true
  logtarget = "file"
  logfile = "/etc/telegraf/telegraf.d/sample.log"
  logfile_rotation_max_size = "25MB"
  logfile_rotation_max_archives = 1

# inputs.s7comm Configuration
[[inputs.s7comm]]
  server = "192.168.4.100:102"
  rack = 0
  slot = 1
  timeout = "10s"
  pdu_size = 10
  debug_connection = false

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.Bool_Value", address="DB2000.X0.0" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.Bool_Value"

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.Byte_Value", address="DB2000.B1" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.Byte_Value"

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.Char_Value", address="DB2000.C2" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.Char_Value"

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.Word_Value", address="DB2000.W4" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.Word_Value"

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.Int_Value", address="DB2000.I6" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.Int_Value"

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.Dword_Value", address="DB2000.DW8" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.Dword_Value"

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.Dint_Value", address="DB2000.DI12" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.Dint_Value"

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.Real_Value", address="DB2000.R16" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.Real_Value"

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.DateTime_Value", address="DB2000.DT20" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.DateTime_Value"

  [[inputs.s7comm.metric]]
    fields = [{ name="sample.String_Value", address="DB2000.S30.13" }]
    [inputs.s7comm.metric.tags]
      machine = "sample.String_Value"

# Filter metrics with repeating field values
[[processors.dedup]]
  dedup_interval = "86400s"

# MQTT Configuration
[[outputs.mqtt]]
  servers = ["tcp://192.168.4.172:1883"]
  topic = "on/ot/sample"
  data_format = "json"
  layout = "non-batch"
  json_timestamp_units = "1ms"
