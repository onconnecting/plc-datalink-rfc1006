# Mosquitto config for the E2E test stack.
# Anonymous listener on 1883 — the test broker is ephemeral, not exposed to
# the host, and only reachable from the e2e bridge network.
listener 1883 0.0.0.0
allow_anonymous true
persistence false
log_dest stdout
# Show PUBLISH / SUBSCRIBE events so the e2e test can be diagnosed from logs.
log_type information
log_type notice
log_type warning
log_type error
log_type subscribe
log_type unsubscribe
